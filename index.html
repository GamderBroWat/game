<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-800 // SKYNET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
overflow: hidden;
font-family: ‘Share Tech Mono’, monospace;
color: #ff2200;
}

#canvas-container {
position: relative;
width: 100vw;
height: 100vh;
}

canvas { display: block; }

.hud {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}

.corner {
position: absolute;
width: 60px; height: 60px;
border-color: #ff2200;
border-style: solid;
opacity: 0.7;
}
.corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
.corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

.title {
position: absolute;
top: 30px;
left: 50%;
transform: translateX(-50%);
font-family: ‘Orbitron’, monospace;
font-size: 13px;
font-weight: 900;
letter-spacing: 8px;
color: #ff2200;
text-shadow: 0 0 20px #ff2200, 0 0 40px #ff220066;
animation: flicker 4s infinite;
}

.model-id {
position: absolute;
top: 55px;
left: 50%;
transform: translateX(-50%);
font-size: 9px;
letter-spacing: 4px;
color: #ff220088;
}

.stats {
position: absolute;
bottom: 40px;
left: 40px;
font-size: 10px;
line-height: 1.8;
color: #ff220099;
}

.stats span { color: #ff2200; }

.scan-line {
position: absolute;
left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, #ff220033, #ff2200, #ff220033, transparent);
animation: scan 3s linear infinite;
opacity: 0.4;
}

.controls-hint {
position: absolute;
bottom: 40px;
right: 40px;
font-size: 9px;
line-height: 2;
color: #ff220066;
text-align: right;
}

.target-reticle {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 200px;
height: 200px;
border: 1px solid #ff220022;
border-radius: 50%;
animation: rotate 8s linear infinite;
}

.target-reticle::before {
content: ‘’;
position: absolute;
top: 50%; left: -20px; right: -20px;
height: 1px;
background: linear-gradient(90deg, transparent, #ff220033, transparent);
}
.target-reticle::after {
content: ‘’;
position: absolute;
left: 50%; top: -20px; bottom: -20px;
width: 1px;
background: linear-gradient(180deg, transparent, #ff220033, transparent);
}

.glitch-text {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, 120px);
font-size: 8px;
letter-spacing: 3px;
color: #ff220055;
animation: glitch 5s infinite;
}

@keyframes scan {
0% { top: -2px; }
100% { top: 100%; }
}

@keyframes flicker {
0%, 95%, 100% { opacity: 1; }
96% { opacity: 0.4; }
97% { opacity: 1; }
98% { opacity: 0.2; }
99% { opacity: 1; }
}

@keyframes rotate {
from { transform: translate(-50%, -50%) rotate(0deg); }
to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes glitch {
0%, 90%, 100% { opacity: 0.4; transform: translate(-50%, 120px); }
91% { transform: translate(-48%, 120px); color: #ff6600; }
92% { transform: translate(-52%, 120px); }
93% { transform: translate(-50%, 120px); opacity: 0.8; }
}
</style>

</head>
<body>
<div id="canvas-container">
  <canvas id="c"></canvas>
  <div class="hud">
    <div class="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="title">CYBERDYNE SYSTEMS</div>
    <div class="model-id">SERIES 800 // MODEL 101 // INFILTRATOR UNIT</div>
    <div class="target-reticle"></div>
    <div class="glitch-text">THREAT ASSESSMENT: ACTIVE</div>
    <div class="stats">
      <div>UNIT: <span>T-800</span></div>
      <div>STATUS: <span>OPERATIONAL</span></div>
      <div>CPU: <span>NEURAL NET PROCESSOR</span></div>
      <div>POWER: <span>IRIDIUM / NUCLEAR</span></div>
      <div>CHASSIS: <span>HYPERALLOY COMBAT</span></div>
    </div>
    <div class="controls-hint">
      DRAG — ROTATE<br>
      SCROLL — ZOOM<br>
      AUTO-ROTATE: ON
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 1, 0);

// Materials
const metalMat = new THREE.MeshStandardMaterial({
  color: 0x888888,
  metalness: 0.95,
  roughness: 0.1,
  envMapIntensity: 1.0,
});

const darkMetalMat = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.95,
  roughness: 0.15,
});

const eyeMat = new THREE.MeshStandardMaterial({
  color: 0xff0000,
  emissive: 0xff1100,
  emissiveIntensity: 3,
  metalness: 0.2,
  roughness: 0.1,
});

const teethMat = new THREE.MeshStandardMaterial({
  color: 0xcccccc,
  metalness: 0.9,
  roughness: 0.05,
});

const darkJointMat = new THREE.MeshStandardMaterial({
  color: 0x222222,
  metalness: 0.8,
  roughness: 0.3,
});

// Group
const terminator = new THREE.Group();

// === HEAD ===
const headGroup = new THREE.Group();
headGroup.position.y = 3.8;

// Skull base
const skullGeo = new THREE.SphereGeometry(0.52, 16, 12);
const skull = new THREE.Mesh(skullGeo, metalMat);
skull.scale.set(1, 1.1, 0.95);
headGroup.add(skull);

// Forehead plate
const foreheadGeo = new THREE.BoxGeometry(0.9, 0.25, 0.15);
const forehead = new THREE.Mesh(foreheadGeo, darkMetalMat);
forehead.position.set(0, 0.3, 0.42);
headGroup.add(forehead);

// Cheekbones
[-0.38, 0.38].forEach(x => {
  const cbGeo = new THREE.BoxGeometry(0.22, 0.18, 0.2);
  const cb = new THREE.Mesh(cbGeo, darkMetalMat);
  cb.position.set(x, 0.05, 0.38);
  headGroup.add(cb);
});

// Eye sockets
[-0.22, 0.22].forEach((x, i) => {
  const socketGeo = new THREE.CylinderGeometry(0.1, 0.12, 0.08, 12);
  const socket = new THREE.Mesh(socketGeo, darkJointMat);
  socket.rotation.x = Math.PI / 2;
  socket.position.set(x, 0.1, 0.46);
  headGroup.add(socket);

  // Eye glow
  const eyeGeo = new THREE.SphereGeometry(0.07, 12, 8);
  const eye = new THREE.Mesh(eyeGeo, eyeMat);
  eye.position.set(x, 0.1, 0.5);
  headGroup.add(eye);

  // Eye light
  const eyeLight = new THREE.PointLight(0xff1100, 2, 1.5);
  eyeLight.position.set(x, 0.1, 0.52);
  headGroup.add(eyeLight);
});

// Nose ridge
const noseGeo = new THREE.BoxGeometry(0.08, 0.2, 0.12);
const nose = new THREE.Mesh(noseGeo, metalMat);
nose.position.set(0, -0.05, 0.5);
headGroup.add(nose);

// Jaw / lower face
const jawGeo = new THREE.BoxGeometry(0.78, 0.25, 0.7);
const jaw = new THREE.Mesh(jawGeo, metalMat);
jaw.position.set(0, -0.28, 0.05);
headGroup.add(jaw);

// Exposed teeth
for (let i = -3; i <= 3; i++) {
  const toothGeo = new THREE.BoxGeometry(0.07, 0.12, 0.06);
  const tooth = new THREE.Mesh(toothGeo, teethMat);
  tooth.position.set(i * 0.1, -0.3, 0.38);
  headGroup.add(tooth);
}

// Chin
const chinGeo = new THREE.BoxGeometry(0.5, 0.1, 0.4);
const chin = new THREE.Mesh(chinGeo, darkMetalMat);
chin.position.set(0, -0.42, 0.08);
headGroup.add(chin);

// Temple details
[-0.5, 0.5].forEach(x => {
  const tGeo = new THREE.BoxGeometry(0.08, 0.3, 0.4);
  const t = new THREE.Mesh(tGeo, darkMetalMat);
  t.position.set(x, 0.1, 0.0);
  headGroup.add(t);
});

// Neck
const neckGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.5, 10);
const neck = new THREE.Mesh(neckGeo, darkMetalMat);
neck.position.y = -0.65;
headGroup.add(neck);

// Neck joints/pistons
for (let a = 0; a < 4; a++) {
  const angle = (a / 4) * Math.PI * 2;
  const pistonGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 6);
  const piston = new THREE.Mesh(pistonGeo, metalMat);
  piston.position.set(Math.cos(angle) * 0.26, -0.6, Math.sin(angle) * 0.26);
  headGroup.add(piston);
}

terminator.add(headGroup);

// === TORSO ===
const torsoGroup = new THREE.Group();
torsoGroup.position.y = 1.8;

// Main chest
const chestGeo = new THREE.BoxGeometry(1.6, 1.5, 0.75);
const chest = new THREE.Mesh(chestGeo, metalMat);
torsoGroup.add(chest);

// Chest plate
const cplateGeo = new THREE.BoxGeometry(1.3, 1.1, 0.12);
const cplate = new THREE.Mesh(cplateGeo, darkMetalMat);
cplate.position.set(0, 0.1, 0.43);
torsoGroup.add(cplate);

// Ribs
for (let i = -2; i <= 2; i++) {
  const ribGeo = new THREE.BoxGeometry(1.3, 0.06, 0.08);
  const rib = new THREE.Mesh(ribGeo, metalMat);
  rib.position.set(0, i * 0.18, 0.46);
  torsoGroup.add(rib);
}

// Shoulder joints
[-0.95, 0.95].forEach(x => {
  const sjGeo = new THREE.SphereGeometry(0.22, 12, 10);
  const sj = new THREE.Mesh(sjGeo, darkJointMat);
  sj.position.set(x, 0.5, 0);
  torsoGroup.add(sj);
});

// Spine ridge
const spineGeo = new THREE.BoxGeometry(0.12, 1.3, 0.1);
const spine = new THREE.Mesh(spineGeo, darkMetalMat);
spine.position.set(0, 0, -0.43);
torsoGroup.add(spine);

// Spine vertebrae
for (let i = -3; i <= 3; i++) {
  const vGeo = new THREE.BoxGeometry(0.2, 0.1, 0.14);
  const v = new THREE.Mesh(vGeo, metalMat);
  v.position.set(0, i * 0.18, -0.46);
  torsoGroup.add(v);
}

// Abs section
const absGeo = new THREE.BoxGeometry(1.3, 0.55, 0.65);
const abs = new THREE.Mesh(absGeo, metalMat);
abs.position.y = -0.95;
torsoGroup.add(abs);

// Pelvis
const pelvisGeo = new THREE.BoxGeometry(1.4, 0.35, 0.6);
const pelvis = new THREE.Mesh(pelvisGeo, darkMetalMat);
pelvis.position.y = -1.3;
torsoGroup.add(pelvis);

terminator.add(torsoGroup);

// === ARMS ===
function makeArm(side) {
  const armGroup = new THREE.Group();
  const xOffset = side * 1.05;

  // Upper arm
  const uaGeo = new THREE.CylinderGeometry(0.16, 0.14, 0.85, 10);
  const ua = new THREE.Mesh(uaGeo, metalMat);
  ua.position.set(xOffset, 2.6, 0);
  ua.rotation.z = side * 0.15;
  armGroup.add(ua);

  // Elbow
  const elbowGeo = new THREE.SphereGeometry(0.16, 10, 8);
  const elbow = new THREE.Mesh(elbowGeo, darkJointMat);
  elbow.position.set(xOffset + side * 0.12, 2.1, 0);
  armGroup.add(elbow);

  // Forearm
  const faGeo = new THREE.CylinderGeometry(0.13, 0.11, 0.8, 10);
  const fa = new THREE.Mesh(faGeo, metalMat);
  fa.position.set(xOffset + side * 0.18, 1.65, 0);
  fa.rotation.z = side * 0.25;
  armGroup.add(fa);

  // Pistons on forearm
  for (let i = 0; i < 2; i++) {
    const pGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6, 6);
    const p = new THREE.Mesh(pGeo, darkMetalMat);
    p.position.set(xOffset + side * 0.18 + (i - 0.5) * 0.12, 1.65, 0.12);
    p.rotation.z = side * 0.25;
    armGroup.add(p);
  }

  // Wrist
  const wristGeo = new THREE.SphereGeometry(0.13, 10, 8);
  const wrist = new THREE.Mesh(wristGeo, darkJointMat);
  wrist.position.set(xOffset + side * 0.28, 1.2, 0);
  armGroup.add(wrist);

  // Hand / palm
  const handGeo = new THREE.BoxGeometry(0.2, 0.28, 0.1);
  const hand = new THREE.Mesh(handGeo, metalMat);
  hand.position.set(xOffset + side * 0.3, 0.9, 0);
  armGroup.add(hand);

  // Fingers
  for (let f = 0; f < 4; f++) {
    const fy = f * 0.06 - 0.09;
    const fGeo = new THREE.CylinderGeometry(0.025, 0.02, 0.22, 6);
    const finger = new THREE.Mesh(fGeo, metalMat);
    finger.rotation.z = Math.PI / 2;
    finger.position.set(xOffset + side * 0.4, 0.82 + fy, 0);
    armGroup.add(finger);

    // Knuckle
    const knuckleGeo = new THREE.SphereGeometry(0.028, 6, 6);
    const knuckle = new THREE.Mesh(knuckleGeo, darkJointMat);
    knuckle.position.set(xOffset + side * 0.35, 0.82 + fy, 0);
    armGroup.add(knuckle);
  }

  // Thumb
  const thumbGeo = new THREE.CylinderGeometry(0.025, 0.02, 0.16, 6);
  const thumb = new THREE.Mesh(thumbGeo, metalMat);
  thumb.rotation.x = Math.PI / 4;
  thumb.rotation.z = Math.PI / 2;
  thumb.position.set(xOffset + side * 0.38, 0.72, 0.06);
  armGroup.add(thumb);

  return armGroup;
}

terminator.add(makeArm(-1));
terminator.add(makeArm(1));

// === LEGS ===
function makeLeg(side) {
  const legGroup = new THREE.Group();
  const xOffset = side * 0.42;

  // Hip joint
  const hipGeo = new THREE.SphereGeometry(0.2, 10, 8);
  const hip = new THREE.Mesh(hipGeo, darkJointMat);
  hip.position.set(xOffset, 0.3, 0);
  legGroup.add(hip);

  // Thigh
  const thighGeo = new THREE.CylinderGeometry(0.19, 0.16, 0.95, 10);
  const thigh = new THREE.Mesh(thighGeo, metalMat);
  thigh.position.set(xOffset, -0.3, 0);
  legGroup.add(thigh);

  // Thigh plates
  const tpGeo = new THREE.BoxGeometry(0.3, 0.6, 0.08);
  const tp = new THREE.Mesh(tpGeo, darkMetalMat);
  tp.position.set(xOffset, -0.28, 0.2);
  legGroup.add(tp);

  // Knee
  const kneeGeo = new THREE.SphereGeometry(0.18, 10, 8);
  const knee = new THREE.Mesh(kneeGeo, darkJointMat);
  knee.position.set(xOffset, -0.8, 0);
  legGroup.add(knee);

  // Kneecap
  const kcGeo = new THREE.BoxGeometry(0.22, 0.14, 0.12);
  const kc = new THREE.Mesh(kcGeo, metalMat);
  kc.position.set(xOffset, -0.8, 0.2);
  legGroup.add(kc);

  // Shin
  const shinGeo = new THREE.CylinderGeometry(0.14, 0.12, 0.9, 10);
  const shin = new THREE.Mesh(shinGeo, metalMat);
  shin.position.set(xOffset, -1.35, 0);
  legGroup.add(shin);

  // Shin pistons
  for (let p = 0; p < 2; p++) {
    const pGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.7, 6);
    const piston = new THREE.Mesh(pGeo, darkMetalMat);
    piston.position.set(xOffset + (p - 0.5) * 0.16, -1.35, 0.12);
    legGroup.add(piston);
  }

  // Ankle
  const ankleGeo = new THREE.SphereGeometry(0.13, 10, 8);
  const ankle = new THREE.Mesh(ankleGeo, darkJointMat);
  ankle.position.set(xOffset, -1.85, 0);
  legGroup.add(ankle);

  // Foot
  const footGeo = new THREE.BoxGeometry(0.3, 0.14, 0.55);
  const foot = new THREE.Mesh(footGeo, metalMat);
  foot.position.set(xOffset, -1.97, 0.1);
  legGroup.add(foot);

  // Toe
  const toeGeo = new THREE.BoxGeometry(0.28, 0.1, 0.15);
  const toe = new THREE.Mesh(toeGeo, darkMetalMat);
  toe.position.set(xOffset, -1.97, 0.42);
  legGroup.add(toe);

  return legGroup;
}

terminator.add(makeLeg(-1));
terminator.add(makeLeg(1));

// Center and add to scene
terminator.position.y = 0.2;
scene.add(terminator);

// === LIGHTING ===
const ambientLight = new THREE.AmbientLight(0x111111, 1);
scene.add(ambientLight);

// Key light (red-tinted)
const keyLight = new THREE.DirectionalLight(0xff4422, 3);
keyLight.position.set(3, 5, 3);
keyLight.castShadow = true;
scene.add(keyLight);

// Fill light (blue cold)
const fillLight = new THREE.DirectionalLight(0x2244aa, 1.5);
fillLight.position.set(-4, 3, -2);
scene.add(fillLight);

// Rim light
const rimLight = new THREE.DirectionalLight(0xffffff, 2);
rimLight.position.set(0, -2, -5);
scene.add(rimLight);

// Ground glow
const groundGlow = new THREE.PointLight(0xff1100, 3, 6);
groundGlow.position.set(0, -2, 0);
scene.add(groundGlow);

// Top accent
const topLight = new THREE.PointLight(0xffffff, 1, 8);
topLight.position.set(0, 8, 2);
scene.add(topLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a0000,
  roughness: 0.8,
  metalness: 0.4,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.85;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines on ground
const gridHelper = new THREE.GridHelper(20, 30, 0xff220022, 0xff220011);
gridHelper.position.y = -1.84;
scene.add(gridHelper);

// Particles
const particleGeo = new THREE.BufferGeometry();
const pCount = 200;
const positions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 20;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xff1100, size: 0.04, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Mouse interaction
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0, rotY = 0;
let targetRotX = 0, targetRotY = 0;
let autoRotate = true;

canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetRotY += dx * 0.008;
  targetRotX += dy * 0.005;
  targetRotX = Math.max(-0.5, Math.min(0.5, targetRotX));
  prevMouse = { x: e.clientX, y: e.clientY };
});

// Touch
canvas.addEventListener('touchstart', e => { isDragging = true; autoRotate = false; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
canvas.addEventListener('touchend', () => { isDragging = false; });
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  targetRotY += dx * 0.008;
  targetRotX += dy * 0.005;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});

// Zoom
let zoom = 8;
canvas.addEventListener('wheel', e => {
  zoom += e.deltaY * 0.01;
  zoom = Math.max(4, Math.min(15, zoom));
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  if (autoRotate) {
    targetRotY += 0.005;
  }

  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;

  terminator.rotation.y = rotY;
  terminator.rotation.x = rotX;

  // Subtle idle animation
  terminator.position.y = 0.2 + Math.sin(time * 0.6) * 0.04;
  headGroup.rotation.y = Math.sin(time * 0.3) * 0.05;

  // Camera zoom
  camera.position.set(0, 2, zoom);
  camera.lookAt(0, 1.5, 0);

  // Particles drift
  particles.rotation.y += 0.001;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
